<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ЗаявОчки</title>
</head>

<body>

<div style="display:flex; justify-content:space-between; align-items:center; background:#f2f2f2; padding:10px;">
    <b>Оператор: {{ name }}</b>
    <a href="/logout">Выйти</a>
</div>

<h2>Новые заявки</h2>

<div id="tickets">

{% for t in tickets %}

<div id="ticket-{{t.id}}">
<pre>{{t.text}}</pre>

<button onclick="closeTicket({{t.id}})">
Закрыть
</button>

<hr>

</div>

{% endfor %}

</div>

<script src="/static/main.js"></script>

</body>
</html>
